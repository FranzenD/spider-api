version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3005:3005"
    env_file:
      - ./backend/.env
    volumes:
      # Mount source code for development (optional - comment out for production)
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend service (uncomment if you want to containerize frontend later)
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"
